name: Verify PR

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache cargo deps/builds (incl. the wasmtime-based complexity meter) so the
      # extra metric step does not slow verification after the first run.
      - uses: Swatinem/rust-cache@v2

      - name: PR boundary guard
        run: bash scripts/guard-pr.sh

      - name: Require Model in PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          model="$(bash scripts/ci-parse-pr-body.sh Model "$PR_BODY" || true)"
          if [[ -z "$model" ]]; then
            echo "::error::Missing required ## Model section in the PR description."
            echo "Add a ## Model section naming the AI model used (e.g. opus 4.8, codex 5.5)."
            exit 1
          fi

      - name: Correctness gate + score
        run: |
          set -euo pipefail
          bash scripts/evaluate.sh --no-guard 2>&1 | tee /tmp/evaluate_full.out
          awk '/^== score ==$/{found=1; next} found' /tmp/evaluate_full.out > /tmp/eval.out
          score="$(grep '^SCORE:' /tmp/eval.out || true)"
          {
            echo "## Verification passed"
            echo
            echo '```'
            cat /tmp/eval.out
            echo '```'
            echo
            echo "**${score}**"
            echo
            echo "Do not commit \`RESULTS.md\` or \`history/entries/\`. Scorekeeper records the ledger after merge."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Complexity metric (wasm fuel, non-gating)
        # Informational only — never fails the build. Measures WORK = init-free
        # wasm fuel (executed operators) for a fixed corpus prefix, from a wasm
        # shim + wasmtime host that live OUTSIDE src/algorithm/ — so it cannot be
        # tampered with from a submission. Deterministic and machine-independent.
        continue-on-error: true
        run: |
          set -euo pipefail
          bash scripts/measure-complexity.sh | tee /tmp/fuel.out
          {
            echo "## Complexity metric (informational, non-gating)"
            echo
            echo '```'
            cat /tmp/fuel.out
            echo '```'
            echo
            echo "WORK = deterministic, tamper-proof wasm fuel (executed operators) for a"
            echo "fixed corpus prefix, measured from outside \`src/algorithm/\`. Init-free"
            echo "(baseline-subtracted) and reproducible on any machine; tracks compute, not"
            echo "cache/memory, so it is not by itself a wall-time predictor."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment score on PR
        # Best-effort only. Fork PRs run with a read-only GITHUB_TOKEN (GitHub
        # forces this regardless of the `pull-requests: write` declared above),
        # so `gh pr comment` fails with "Resource not accessible by integration".
        # The score is already in the job summary, so a failed comment must not
        # fail verification — otherwise Auto-merge (gated on a successful Verify
        # PR run) would never fire for third-party submissions.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          score="$(grep '^SCORE:' /tmp/eval.out || echo 'SCORE: unknown')"
          prev="$(awk -F'|' '
            /^\| [0-9]/ {
              gsub(/ /,"",$5)
              if ($5 ~ /^[0-9]+$/) {
                if (best=="" || $5+0 < best+0) best=$5
              }
            }
            END { print best }
          ' RESULTS.md)"
          delta=""
          if [[ -n "$prev" && "$score" =~ SCORE:\ ([0-9]+) ]]; then
            cur="${BASH_REMATCH[1]}"
            d=$((cur - prev))
            if (( d < 0 )); then delta=" (**new record**, Δ ${d})"
            elif (( d == 0 )); then delta=" (tie)"
            else delta=" (Δ +${d} vs record ${prev})"
            fi
          fi
          work="$(grep '^WORK:' /tmp/fuel.out 2>/dev/null || true)"
          {
            echo "## CI verification passed ✅"
            echo
            echo "\`${score}\`${delta}"
            if [[ -n "$work" ]]; then
              echo
              echo "\`${work}\` — deterministic, tamper-proof complexity (wasm fuel, non-gating)."
            fi
            echo
            echo "This score was computed on GitHub Actions — local claims are not trusted."
            echo
            echo "Auto-merge will run via **Auto-merge** workflow (default \`GITHUB_TOKEN\`)."
            echo "**Scorekeeper** will append the verified entry to \`RESULTS.md\` and"
            echo "\`history/entries/\` from your PR description (\`## Model\`,"
            echo "\`## Approach\`, \`## Iteration notes\`)."
          } > /tmp/pr-comment.md
          if ! gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/pr-comment.md; then
            echo "::warning::Could not post the score comment — fork PRs run with a read-only GITHUB_TOKEN. The score is in the job summary above; this does not affect verification or auto-merge."
          fi
